name: Deploy Hitster Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: hitster-cloudflare-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Zu Cloudflare deployen
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
